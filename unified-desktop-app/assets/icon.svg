<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>
  
  <!-- Chat bubble -->
  <path d="M128 50c-43 0-78 30-78 67 0 20 10 38 27 51l-8 32 36-18c7 2 15 3 23 3 43 0 78-30 78-67s-35-68-78-68z" fill="white" opacity="0.95"/>
  
  <!-- Orbit ring 1 -->
  <ellipse cx="128" cy="117" rx="55" ry="20" fill="none" stroke="url(#orbitGrad)" stroke-width="3" transform="rotate(-20, 128, 117)"/>
  
  <!-- Orbit ring 2 -->
  <ellipse cx="128" cy="117" rx="55" ry="20" fill="none" stroke="url(#orbitGrad)" stroke-width="3" transform="rotate(40, 128, 117)"/>
  
  <!-- Center dot -->
  <circle cx="128" cy="117" r="12" fill="#667eea"/>
  
  <!-- Orbiting dots -->
  <circle cx="85" cy="95" r="6" fill="#667eea"/>
  <circle cx="170" cy="105" r="6" fill="#764ba2"/>
  <circle cx="115" cy="140" r="6" fill="#8b5cf6"/>
</svg>
